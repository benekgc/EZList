<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="manifest" href="manifest.json">
	<link rel="stylesheet" href="style.css">
	<script src="script.js" defer></script>
	<meta name="theme-color" content="#1C1B1E">
	<title>EZList</title>
</head>

<body>
    <header>
        <h1>ez.</h1>
    </header>

    <div class="controls-top">
        <button onclick="showProjectInfo()">About</button>
        <label class="ui-switch">
            <input type="checkbox" id="darkModeCheckbox" onchange="toggleDarkMode()">
            <div class="slider">
                <div class="circle"></div>
            </div>
        </label>
    </div>

    <div class="clock" id="clock">00:00:00</div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeAllModals()"></div>
    
    <div id="projectInfo" class="project-info-container">
        <div class="modal-header">
            <h3 style="margin:0">About Project</h3>
            <button class="btn-icon" style="background:rgba(255,255,255,0.2)" onclick="closeProjectInfo()">✕</button>
        </div>
        <div class="modal-content">
            <p>A modern <b>Checklist Application</b> designed with Material Design 3 principles. It features persistent local storage and intuitive user experience.</p>
        </div>
    </div>

    <div id="promptModal" class="prompt-modal-container">
        <div class="modal-header">
            <h3 id="promptTitle" style="margin:0">New</h3>
        </div>
        <div class="modal-content">
            <input type="text" id="promptInput" class="prompt-input" placeholder="Type here...">
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn-tonal" onclick="closePromptModal()">Cancel</button>
                <button class="btn-filled" id="promptConfirmBtn">Save</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="prompt-modal-container">
        <div class="modal-header">
            <h3 id="confirmTitle" style="margin:0">Delete</h3>
        </div>
        <div class="modal-content">
            <p id="confirmMessage" style="margin: 0 0 20px 0; font-size: 1.1rem; line-height: 1.5;"></p>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn-tonal" onclick="closeConfirmModal()">Cancel</button>
                <button class="btn-error" id="confirmAcceptBtn">Delete</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="new-list-container">
            <button class="btn-filled" onclick="createNewList()">
                <span style="font-size: 1.2rem;">+</span> Create New List
            </button>
        </div>
        <div id="lists-container"></div>
    </div>
</body>
</html>
